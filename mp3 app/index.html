<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MP3 Player</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="player" id="player">

    <!-- Title bar -->
    <div class="title-bar">
      <div class="title-inner">
        <div class="song-title-wrap">
          <span class="song-title" id="songTitle">Take me Away</span>
        </div>
      </div>
    </div>

    <!-- Art area -->
    <div class="art-area">
      <div class="bg-image">
        <img class="anime-girl" src="assets/anime girl 2.png" alt="">
        <img class="heartbeat" src="assets/heartbeat.png" alt="">
        <div class="album-cover-wrap" id="albumCoverWrap" title="Click to load MP3">
          <img class="album-cover" src="assets/album cover 1.png" alt="Album Cover">
          <div class="load-hint">Click to load MP3</div>
        </div>
      </div>
    </div>

    <!-- Progress bar -->
    <div class="progress-area">
      <input type="range" id="progressBar" class="progress-bar" min="0" max="100" value="0" step="0.1">
      <div class="time-row">
        <span id="currentTime">0:00</span>
        <span id="duration">0:00</span>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn btn-prev" id="btnPrev" title="Previous">
        <img src="assets/Left Button.png" alt="Prev">
      </button>
      <button class="btn btn-play" id="btnPlay" title="Play / Pause">
        <img src="assets/button yellow 1.png" alt="Play">
      </button>
      <button class="btn btn-next" id="btnNext" title="Next">
        <img src="assets/Right Button.png" alt="Next">
      </button>
    </div>

    <!-- Hidden file input -->
    <input type="file" id="fileInput" accept="audio/*" multiple style="display:none">
  </div>

  <audio id="audio"></audio>
  <script src="script.js"></script>
  
</body>
</html>
